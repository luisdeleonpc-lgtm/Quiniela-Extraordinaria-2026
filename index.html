<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  html, body { margin: 0; padding: 0; height: 100%; }

  .qn {
    --bg: #0A2620;
    --bg-deep: #071B16;
    --surface: #11352B;
    --surface-2: #16412F;
    --inset: #082019;
    --gold: #F2B705;
    --gold-soft: #F7D154;
    --cream: #F5F1E6;
    --muted: #9FBFAE;
    --red: #E8553D;
    --line: rgba(245,241,230,0.12);
    --petrol: #0D3B4F;
    --petrol-deep: #082836;
    --petrol-light: #1A5870;
    --yellow-bright: #FFD400;
    --green-dark-glass: rgba(8, 32, 25, 0.82);
    --group-a: #E8553D;
    --group-f: #3B82F6;
    --group-g: #34D399;
    --group-h: #FB923C;
    font-family: 'Manrope', sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(242,183,5,0.06), transparent 45%),
      repeating-linear-gradient(0deg, rgba(245,241,230,0.025) 0px, rgba(245,241,230,0.025) 1px, transparent 1px, transparent 64px),
      repeating-linear-gradient(90deg, rgba(245,241,230,0.025) 0px, rgba(245,241,230,0.025) 1px, transparent 1px, transparent 64px),
      var(--bg);
    color: var(--cream);
    min-height: 100vh;
    width: 100%;
    box-sizing: border-box;
  }
  .qn * { box-sizing: border-box; }
  .qn h1, .qn h2, .qn h3, .qn .disp {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin: 0;
  }
  .qn .mono { font-family: 'Space Mono', monospace; }

  /* ---------- Login ---------- */
  .qn-login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 110px 16px 40px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 820px 560px at 50% 104%, rgba(74,222,128,0.50), rgba(74,222,128,0.10) 42%, transparent 74%),
      radial-gradient(ellipse 980px 860px at -10% 26%, rgba(255,107,53,0.50), rgba(232,85,61,0.16) 48%, transparent 74%),
      radial-gradient(ellipse 980px 860px at 110% 26%, rgba(34,211,238,0.44), rgba(74,222,128,0.14) 48%, transparent 74%),
      radial-gradient(circle 340px at 50% 4%, rgba(242,183,5,0.48), transparent 74%),
      linear-gradient(180deg, #03060A 0%, #050E10 45%, #03130D 100%);
  }
  .qn-beam { position: absolute; pointer-events: none; mix-blend-mode: screen; z-index: 0; }
  .qn-beam-1 { left: -70px; top: -8%; width: 190px; height: 125%; background: linear-gradient(200deg, transparent 0%, rgba(255,107,53,0.40) 45%, rgba(242,183,5,0.28) 56%, transparent 100%); transform: rotate(9deg); }
  .qn-beam-2 { left: 60px; top: -12%; width: 100px; height: 120%; background: linear-gradient(200deg, transparent 0%, rgba(242,183,5,0.26) 50%, transparent 100%); transform: rotate(11deg); }
  .qn-beam-3 { right: -70px; top: -8%; width: 190px; height: 125%; background: linear-gradient(160deg, transparent 0%, rgba(34,211,238,0.36) 45%, rgba(74,222,128,0.26) 56%, transparent 100%); transform: rotate(-9deg); }
  .qn-beam-4 { right: 60px; top: -12%; width: 100px; height: 120%; background: linear-gradient(160deg, transparent 0%, rgba(74,222,128,0.26) 50%, transparent 100%); transform: rotate(-11deg); }
  .qn-confetti-piece { position: absolute; pointer-events: none; z-index: 1; border-radius: 1px; }
  .qn-pitch-lines { position: absolute; bottom: 0; left: 0; width: 100%; height: 160px; z-index: 0; pointer-events: none; }
  .qn-login-stage { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; }
  .qn-emblem-wrap { position: relative; width: 170px; height: 170px; margin-bottom: -44px; display: flex; align-items: center; justify-content: center; z-index: 1; }
  .qn-emblem-glow { position: absolute; inset: -36px; border-radius: 50%; background: radial-gradient(circle, rgba(242,183,5,0.55) 0%, rgba(242,183,5,0.16) 42%, transparent 72%); filter: blur(4px); }
  .qn-emblem-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(242,183,5,0.38); }
  .qn-emblem-ring.r1 { inset: 6px; }
  .qn-emblem-ring.r2 { inset: -20px; border-color: rgba(242,183,5,0.2); }
  .qn-emblem-beam { position: absolute; width: 2px; height: 56px; top: -56px; left: 50%; transform: translateX(-50%); background: linear-gradient(180deg, rgba(242,183,5,0.9), transparent); }
  .qn-emblem-trophy { width: 90px; height: 90px; position: relative; z-index: 2; filter: drop-shadow(0 0 16px rgba(242,183,5,0.75)); }
  .qn-login-card { width: 100%; background: rgba(10,30,24,0.92); border: 1px solid rgba(242,183,5,0.3); border-radius: 16px; padding: 32px 28px; box-shadow: 0 0 0 1px rgba(242,183,5,0.06), 0 30px 70px rgba(0,0,0,0.55), 0 0 50px rgba(242,183,5,0.08); position: relative; z-index: 2; backdrop-filter: blur(2px); }
  .qn-hero { text-align: center; margin-bottom: 24px; }
  .qn-hero .qn-trophy-icon { width: 46px; height: 46px; margin: 0 auto 8px; display: block; }
  .qn-hero h1 { font-size: 28px; color: var(--cream); line-height: 1.1; }
  .qn-hero h1 span { color: var(--gold); }
  .qn-hero p { color: var(--muted); font-size: 13px; margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .qn-tabs { display: flex; background: var(--inset); border-radius: 10px; padding: 4px; margin-bottom: 22px; border: 1px solid var(--line); }
  .qn-tab { flex: 1; text-align: center; padding: 9px 8px; border-radius: 7px; font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; color: var(--muted); background: transparent; border: none; transition: all .15s ease; }
  .qn-tab.active { background: var(--gold); color: var(--bg-deep); font-weight: 600; }
  .qn-field { margin-bottom: 14px; }
  .qn-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .qn-input { width: 100%; background: var(--inset); border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; color: var(--cream); font-size: 15px; font-family: 'Manrope', sans-serif; outline: none; }
  .qn-input:focus { border-color: var(--gold); }
  .qn-btn { width: 100%; background: var(--gold); color: var(--bg-deep); border: none; border-radius: 8px; padding: 12px; font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: filter .15s ease; }
  .qn-btn:hover { filter: brightness(1.08); }
  .qn-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .qn-btn-ghost { background: transparent; color: var(--cream); border: 1px solid var(--line); width: auto; padding: 10px 18px; }
  .qn-btn-ghost:hover { border-color: var(--gold); filter: none; background: rgba(242,183,5,0.06); }
  .qn-btn-add { background: var(--yellow-bright); color: #1A1400; box-shadow: 0 0 0 1px rgba(255,212,0,0.4), 0 4px 14px rgba(255,212,0,0.25); }
  .qn-btn-add:hover { filter: brightness(1.05); }
  .qn-error { background: rgba(232,85,61,0.12); border: 1px solid rgba(232,85,61,0.4); color: #FFB3A4; font-size: 13px; padding: 9px 12px; border-radius: 8px; margin-bottom: 14px; }

  /* ---------- App shell ---------- */
  .qn-shell { min-height: 100vh; padding-bottom: 60px; }
  .qn-shell-admin {
    background:
      radial-gradient(ellipse 760px 420px at 50% 100%, rgba(52,211,153,0.07), transparent 65%),
      radial-gradient(ellipse 620px 520px at 0% 0%, rgba(13,59,79,0.55), transparent 62%),
      radial-gradient(ellipse 620px 520px at 100% 0%, rgba(13,59,79,0.55), transparent 62%),
      radial-gradient(circle 260px at 50% 0%, rgba(242,183,5,0.10), transparent 70%);
  }
  .qn-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); background: rgba(7,27,22,0.7); backdrop-filter: blur(6px); position: sticky; top: 0; z-index: 10; gap: 12px; flex-wrap: wrap; }
  .qn-topbar-admin { background: linear-gradient(135deg, rgba(13,59,79,0.92), rgba(8,40,54,0.92)); border-bottom: 1px solid rgba(26,88,112,0.6); }
  .qn-brand { display: flex; align-items: center; gap: 10px; }
  .qn-brand h2 { font-size: 17px; color: var(--cream); }
  .qn-brand h2 span { color: var(--gold); }
  .qn-who { display:flex; align-items:center; gap: 10px; }
  .qn-who .name { font-size: 13px; color: var(--muted); }
  .qn-iconbtn { background: var(--surface); border: 1px solid var(--line); color: var(--cream); border-radius: 8px; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; font-family: 'Manrope', sans-serif; }
  .qn-iconbtn:hover { border-color: var(--red); color: var(--red); }

  .qn-nav { display: flex; gap: 4px; padding: 14px 20px 0; overflow-x: auto; }
  .qn-navbtn { background: transparent; border: none; color: var(--muted); padding: 10px 14px; font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .qn-navbtn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .qn-nav-admin .qn-navbtn { border-radius: 8px; border-bottom: 2px solid transparent; margin-bottom: 4px; }
  .qn-nav-admin .qn-navbtn.active { color: var(--bg-deep); background: var(--gold); border-bottom-color: transparent; font-weight: 600; }

  .qn-content { padding: 20px; max-width: 980px; margin: 0 auto; }
  .qn-day-header { display: flex; align-items: center; gap: 10px; margin: 28px 0 14px; color: var(--gold-soft); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
  .qn-day-header:first-child { margin-top: 6px; }
  .qn-day-header::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .qn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .qn-card { background: var(--surface); border: 1px solid var(--line); border-left: 4px solid var(--gold); border-radius: 12px; padding: 16px; }
  .qn-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .qn-badge { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-soft); border: 1px solid rgba(242,183,5,0.35); background: rgba(242,183,5,0.08); padding: 3px 8px; border-radius: 5px; font-family: 'Oswald', sans-serif; }
  .qn-status { font-size: 11px; display: flex; align-items: center; gap: 4px; color: var(--muted); }
  .qn-status.locked { color: var(--red); }

  .qn-team-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .qn-flag-swatch { position: relative; width: 30px; height: 21px; border-radius: 3px; overflow: hidden; box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 1px 3px rgba(0,0,0,0.4); flex-shrink: 0; }
  .qn-avatar { position: relative; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--gold); background: var(--inset); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.35); }
  .qn-avatar-empty { color: var(--gold); }

  /* ---- Rules modal ---- */
  .qn-modal-overlay {
    position: fixed; inset: 0; background: rgba(5,20,14,0.85); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 16px;
  }
  .qn-modal {
    background: linear-gradient(160deg, #0D2D20, #071B16 70%);
    border: 1.5px solid rgba(242,183,5,0.45); border-radius: 18px;
    padding: 28px 28px 22px; max-width: 520px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(242,183,5,0.1);
    max-height: 90vh; overflow-y: auto;
  }
  .qn-modal-logo { text-align: center; margin-bottom: 6px; font-size: 28px; }
  .qn-modal-title { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: var(--gold); text-align: center; margin-bottom: 2px; letter-spacing: 0.04em; }
  .qn-modal-sub { font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--gold-soft); text-align: center; margin-bottom: 18px; letter-spacing: 0.02em; }
  .qn-modal-divider { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
  .qn-modal-rule { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13.5px; color: var(--cream); line-height: 1.45; }
  .qn-modal-rule .bullet { color: var(--gold); font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .qn-modal-sub-rule { display: flex; gap: 8px; margin: 4px 0 4px 24px; font-size: 12.5px; color: var(--muted); }
  .qn-modal-sub-rule .dot { flex-shrink: 0; }
  .qn-modal-section { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; margin: 16px 0 10px; }
  .qn-modal-footer { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; }
  .qn-modal-btn { display: block; width: 100%; margin-top: 20px; padding: 13px; background: var(--gold); color: var(--bg-deep); font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: none; border-radius: 10px; cursor: pointer; transition: opacity .15s; }
  .qn-modal-btn:hover { opacity: 0.88; }
  .qn-team-name { flex: 1; font-size: 14.5px; font-weight: 600; }
  .qn-score-input { width: 48px; height: 44px; background: var(--inset); border: 1px solid var(--line); border-radius: 7px; color: var(--gold-soft); font-family: 'Space Mono', monospace; font-size: 20px; text-align: center; box-shadow: inset 0 2px 6px rgba(0,0,0,0.5); }
  .qn-score-input:focus { outline: none; border-color: var(--gold); }
  .qn-score-input:disabled { color: var(--muted); opacity: 0.6; }
  .qn-card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; flex-wrap: wrap; }
  .qn-save { background: var(--gold); color: var(--bg-deep); border: none; border-radius: 7px; padding: 8px 14px; font-family: 'Oswald', sans-serif; font-size: 12.5px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; cursor: pointer; }
  .qn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .qn-saved-tag { font-size: 11px; color: var(--muted); display:flex; align-items:center; gap:4px; }
  .qn-points-tag { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--gold); background: rgba(242,183,5,0.1); padding: 3px 8px; border-radius: 6px; }

  /* ---------- Bonus matches ---------- */
  .qn-notice-banner {
    display: flex; align-items: center; gap: 10px; background: linear-gradient(90deg, rgba(242,183,5,0.16), rgba(242,183,5,0.05));
    border: 1px solid rgba(242,183,5,0.4); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px;
  }
  .qn-notice-banner .icon { font-size: 20px; flex-shrink: 0; }
  .qn-notice-banner .text { flex: 1; font-size: 13px; color: var(--cream); line-height: 1.4; }
  .qn-notice-banner .text b { color: var(--gold-soft); }
  .qn-notice-close { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 2px 6px; line-height: 1; flex-shrink: 0; }
  .qn-notice-close:hover { color: var(--cream); }

  .qn-bonus-card {
    position: relative; background: linear-gradient(160deg, rgba(242,183,5,0.14), var(--green-dark-glass) 55%);
    border: 1.5px solid rgba(242,183,5,0.55); border-radius: 14px; padding: 18px; margin-bottom: 22px;
    box-shadow: 0 6px 22px rgba(242,183,5,0.12);
  }
  .qn-bonus-tag {
    display: inline-flex; align-items: center; gap: 6px; font-family: 'Oswald', sans-serif; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; color: var(--bg-deep); background: var(--gold);
    padding: 4px 10px; border-radius: 999px; margin-bottom: 12px;
  }
  .qn-bonus-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .qn-bonus-title { font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 600; color: var(--cream); }
  .qn-bonus-sub { font-size: 12px; color: var(--gold-soft); margin-top: 2px; }
  .qn-bonus-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; gap: 8px; flex-wrap: wrap; }

  /* ---------- Admin ---------- */
  .qn-section-title { font-size: 19px; margin-bottom: 14px; color: var(--cream); display:flex; align-items:center; gap:8px; }
  .qn-panel { background: var(--green-dark-glass); backdrop-filter: blur(6px); border: 1px solid rgba(74,222,128,0.18); border-radius: 12px; padding: 18px; margin-bottom: 18px; }
  .qn-add-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .qn-add-row input { flex: 1; }
  .qn-user-list { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .qn-user-card { background: var(--green-dark-glass); backdrop-filter: blur(4px); border: 1px solid rgba(74,222,128,0.16); border-radius: 9px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .qn-user-name { font-weight: 700; font-size: 14.5px; }
  .qn-cred-pill { font-family: 'Space Mono', monospace; font-size: 12.5px; color: var(--gold-soft); background: rgba(242,183,5,0.08); border: 1px solid rgba(242,183,5,0.25); padding: 5px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 8px; }
  .qn-user-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .qn-tiny-btn { background: transparent; border: 1px solid var(--line); color: var(--muted); border-radius: 6px; padding: 6px 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 12px; text-decoration: none; font-family: 'Manrope', sans-serif; }
  .qn-tiny-btn:hover { border-color: var(--gold); color: var(--gold-soft); }

  .qn-result-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .qn-result-row:last-child { border-bottom: none; }
  .qn-result-teams { flex: 1; min-width: 200px; font-size: 14px; display: flex; align-items: center; gap: 6px; }

  .qn-pred-match-head { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--line); }
  .qn-pred-list { display: flex; flex-direction: column; gap: 2px; }
  .qn-pred-row { display: flex; align-items: center; gap: 10px; padding: 7px 4px; border-bottom: 1px solid rgba(245,241,230,0.06); }
  .qn-pred-row:last-child { border-bottom: none; }
  .qn-pred-name { flex: 1; font-size: 13.5px; font-weight: 600; }
  .qn-pred-score { font-size: 14px; color: var(--gold-soft); min-width: 56px; text-align: right; }

  .qn-settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .qn-settings-row label { font-size: 13px; color: var(--muted); min-width: 170px; }
  .qn-settings-row .qn-input { max-width: 140px; }
  .qn-subhead { font-size: 14px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* ---------- Leaderboard ---------- */
  .qn-lb-row { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 9px; margin-bottom: 6px; background: var(--inset); border: 1px solid var(--line); }
  .qn-lb-row.top1 { border-color: rgba(242,183,5,0.5); background: rgba(242,183,5,0.08); }
  .qn-lb-rank { font-family: 'Oswald', sans-serif; font-size: 16px; width: 26px; color: var(--muted); text-align: center; }

function stripesBackground(stripes, dir) {
  if (stripes.length === 1) {
    const c = Array.isArray(stripes[0]) ? stripes[0][0] : stripes[0];
    return `background:${c};`;
  }
  const weighted = Array.isArray(stripes[0]);
  let stops;
  if (weighted) {
    const total = stripes.reduce((s, c) => s + c[1], 0);
    let acc = 0;
    stops = stripes.map(([c, w]) => {
      const start = (acc / total) * 100; acc += w; const end = (acc / total) * 100;
      return `${c} ${start.toFixed(2)}%, ${c} ${end.toFixed(2)}%`;
    }).join(", ");
  } else {
    const n = stripes.length;
    stops = stripes.map((c, i) => `${c} ${(i / n * 100).toFixed(2)}%, ${c} ${((i + 1) / n * 100).toFixed(2)}%`).join(", ");
  }
  return `background:linear-gradient(${dir === "v" ? "90deg" : "180deg"}, ${stops});`;
}
function shapeStyle(s) {
  if (s.type === "rect") {
    if (s.center) {
      return `position:absolute;top:${s.top}%;left:${s.left}%;width:${s.w}%;height:${s.h}%;background:${s.color};transform:translate(-50%,-50%)${s.rotate ? ` rotate(${s.rotate}deg)` : ""};`;
    }
    return `position:absolute;top:${s.top}%;left:${s.left}%;width:${s.w}%;height:${s.h}%;background:${s.color};`;
  }
  if (s.type === "circle") {
    return `position:absolute;top:${s.top}%;left:${s.left}%;width:${s.w}%;height:${s.h}%;background:${s.color};border-radius:50%;transform:translate(-50%,-50%);`;
  }
  if (s.type === "diamond") {
    return `position:absolute;top:${s.top}%;left:${s.left}%;width:${s.w}%;height:${s.h}%;background:${s.color};transform:translate(-50%,-50%) rotate(45deg);`;
  }
  if (s.type === "triangle") {
    const clip = s.side === "right" ? "polygon(100% 0,100% 100%,0 50%)" : "polygon(0 0,0 100%,100% 50%)";
    const pos = s.side === "right" ? "right:0;" : "left:0;";
    return `position:absolute;top:0;${pos}width:${s.w}%;height:100%;background:${s.color};clip-path:${clip};`;
  }
  if (s.type === "taegeuk") {
    return `position:absolute;top:${s.top}%;left:${s.left}%;width:${s.w}%;height:${s.h}%;border-radius:50%;overflow:hidden;background:linear-gradient(135deg, ${s.colorTop} 50%, ${s.colorBottom} 50%);transform:translate(-50%,-50%);`;
  }

}

}

function hexToRgba(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

--------------------------------------------------------------- */
function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function stripAccents(s) { return s.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }
function normalizeBase(name) {
  const first = (name || "").trim().split(/\s+/)[0] || "jugador";
  return stripAccents(first).toLowerCase().replace(/[^a-z]/g, "") || "jugador";
}
function generateUsername(name, existingUsers) {
  const base = normalizeBase(name);
  let candidate = base, n = 0;
  while (existingUsers[candidate]) { n++; candidate = base + n; }
  return candidate;
}
function generatePassword(len = 6) {
  let s = "";
  for (let i = 0; i < len; i++) s += PASS_CHARS[Math.floor(Math.random() * PASS_CHARS.length)];
  return s;
}
function lockTimeMs(match) { return new Date(match.kickoff).getTime() - LOCK_MINUTES_BEFORE * 60000; }
function isLocked(match, now) { return now >= lockTimeMs(match); }
function bonusLockTimeMs(match) { return new Date(match.kickoff).getTime() - BONUS_LOCK_MINUTES_BEFORE * 60000; }
function isBonusLocked(match, now) { return now >= bonusLockTimeMs(match); }
/* Calendar-day helpers, anchored to Guatemala time (UTC-6), so "today" and
   "tomorrow" are computed consistently no matter where the device opening
   the app is physically located. */
function guateDateKey(ms) { return new Date(ms - 6 * 3600000).toISOString().slice(0, 10); }
function bonusDayKey(bm) { return bm.kickoff.slice(0, 10); }
function addDaysKey(key, delta) {
  const d = new Date(key + "T00:00:00Z");
  d.setUTCDate(d.getUTCDate() + delta);
  return d.toISOString().slice(0, 10);
}
function calcBonusPoints(pred, result, points) {
  if (!pred || !result) return null;
  return (pred.home === result.home && pred.away === result.away) ? points : 0;
}
function formatRemaining(ms) {
  if (ms <= 0) return null;
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60), m = totalMin % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function ensureScoringShape(d) {
  if (!d.scoring || typeof d.scoring.outcome !== "number" || typeof d.scoring.perGoal !== "number") {
    d.scoring = { outcome: 3, perGoal: 1 };
  }
  if (!d.bonusPredictions) d.bonusPredictions = {};
  if (!d.bonusResults) d.bonusResults = {};
  return d;
}
function outcomeHit(pred, result) {
  return Math.sign(pred.home - pred.away) === Math.sign(result.home - result.away);
}
function isExactScore(pred, result) {
  return pred.home === result.home && pred.away === result.away;
}
function calcPoints(pred, result, scoring) {
  if (!pred || !result) return null;
  let points = 0;
  if (outcomeHit(pred, result)) points += scoring.outcome;
  if (pred.home === result.home) points += scoring.perGoal;
  if (pred.away === result.away) points += scoring.perGoal;
  return points;
}
function pointsBreakdown(pred, result, scoring) {
  const oh = outcomeHit(pred, result);
  const hh = pred.home === result.home;
  const ah = pred.away === result.away;
  const parts = [];
  parts.push(`${oh ? "✓" : "✗"} ganador/empate +${oh ? scoring.outcome : 0}`);
  parts.push(`${hh ? "✓" : "✗"} goles local +${hh ? scoring.perGoal : 0}`);
  parts.push(`${ah ? "✓" : "✗"} goles visita +${ah ? scoring.perGoal : 0}`);
  return parts.join(" · ");
}
function buildLeaderboard(data) {
  const rows = Object.entries(data.users).map(([username, u]) => {
    let total = 0, exact = 0, hits = 0, played = 0, bonusPts = 0, bonusHits = 0;
    MATCHES.forEach(m => {
      const pred = data.predictions[username] && data.predictions[username][m.id];
      const result = data.results[m.id];
      if (pred && result) {
        played++;
        total += calcPoints(pred, result, data.scoring);
        if (isExactScore(pred, result)) exact++;
        else if (outcomeHit(pred, result)) hits++;
      }
    });
    BONUS_MATCHES.forEach(bm => {
      const pred = data.bonusPredictions[username] && data.bonusPredictions[username][bm.id];
      const result = data.bonusResults[bm.id];
      if (pred && result) {
        const pts = calcBonusPoints(pred, result, bm.points);
        bonusPts += pts;
        if (pts > 0) bonusHits++;
      }
    });
    total += bonusPts;
    return { username, name: u.name, total, exact, hits, played, bonusPts, bonusHits, favoriteTeam: u.favoriteTeam || null };
  });
  rows.sort((a, b) => b.total - a.total || b.exact - a.exact || a.name.localeCompare(b.name));
  return rows;
}
function clone(o) { return JSON.parse(JSON.stringify(o)); }

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimerId);

}

/* ---------------------------------------------------------------
   FIREBASE STORAGE LAYER
   – Shared data (quiniela state) → Firebase Realtime Database
   – Session (who is logged in) → localStorage (per-device only)
--------------------------------------------------------------- */
const DB_PATH = "quiniela-2026";

/* Firebase signals readiness via a CustomEvent; we capture it here
   in case it fires before or after init() runs. */
let _fbResolve;
const _fbReady = new Promise(res => { _fbResolve = res; });
if (window._fbDb) {
  _fbResolve(); // already ready (shouldn't happen but safe)
} else {
  window.addEventListener("firebase-ready", () => _fbResolve(), { once: true });
}

async function waitForFirebase(timeout = 10000) {
  return Promise.race([
    _fbReady,
    new Promise((_, rej) => setTimeout(() => rej(new Error("Firebase timeout")), timeout))
  ]);
}

async function fbRead() {
  const snap = await window._fbGet(window._fbRef(window._fbDb, DB_PATH));
  return snap.exists() ? snap.val() : null;
}

async function fbWrite(value) {
  await window._fbSet(window._fbRef(window._fbDb, DB_PATH), value);
}

/* Listen for remote changes and re-render when another client writes */
function startRealtimeSync() {
  window._fbOnValue(window._fbRef(window._fbDb, DB_PATH), (snap) => {
    if (!snap.exists()) return;
    const remote = ensureScoringShape(snap.val());
    /* Ignore the echo of our own recent write */
    if (Date.now() - lastLocalWriteAt < 8000) return;
    DATA = remote;
    const active = document.activeElement;
    const typing = active && active.tagName === "INPUT" &&
      document.getElementById("qn-content") &&
      document.getElementById("qn-content").contains(active);
    if (!typing) render();
  });
}

async function loadData() {
  try {
    const raw = await fbRead();
    if (raw) {
      DATA = ensureScoringShape(raw);
      return;
    }
  } catch (e) {
    if (DATA) return;
  }
  if (!DATA) {
    DATA = clone(DEFAULT_DATA);
    try { await fbWrite(DATA); } catch (e2) {}
  }
}

let lastLocalWriteAt = 0;
async function persist(next) {
  DATA = next;
  lastLocalWriteAt = Date.now();
  try {
    await fbWrite(next);
  } catch (e) {
    showToast("No se pudo guardar. Intenta de nuevo.");
  }
}

/* Session lives in localStorage — no server needed, per-device */
async function restoreSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (raw) SESSION = JSON.parse(raw);
  } catch (e) {}
}
async function doLogin(role, username) {
  SESSION = { role, username: username || null };
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(SESSION)); } catch (e) {}
  if (role === "admin") { ADMIN_TAB = "users"; } else { PLAYER_TAB = "matches"; NOTICE_DISMISSED = false; RULES_ACCEPTED = false; }
  render();
}
async function doLogout() {
  SESSION = null;
  RULES_ACCEPTED = false;
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  render();
}

function savePredFooterAndStatus(matchId) {
  // refresh just this card's footer + status badge without rebuilding the whole grid
  const username = SESSION.username;
  const m = matchById(matchId);
  const locked = isLocked(m, NOW);
  const saved = DATA.predictions[username] && DATA.predictions[username][matchId];
  const result = DATA.results[matchId];
  const pts = result && saved ? calcPoints(saved, result, DATA.scoring) : null;

  const footEl = document.getElementById(`foot-${matchId}`);
  if (footEl) {

    if (result) {

        ? `<div><span class="qn-points-tag">Resultado ${result.home}-${result.away} · +${pts} pts</span>

async function savePrediction(matchId) {
  const username = SESSION.username;
  const homeInput = document.getElementById(`pred-home-${matchId}`);
  const awayInput = document.getElementById(`pred-away-${matchId}`);
  const home = homeInput.value.trim();
  const away = awayInput.value.trim();
  if (home === "" || away === "") { showToast("Pon un marcador para ambos equipos."); return; }
  const next = clone(DATA);
  if (!next.predictions[username]) next.predictions[username] = {};
  next.predictions[username][matchId] = { home: Number(home), away: Number(away), updatedAt: new Date().toISOString() };
  await persist(next);
  savePredFooterAndStatus(matchId);
  showToast("Pronóstico guardado");
}

/* ---------------------------------------------------------------
   TICK (countdown + lock updates without full re-render)
--------------------------------------------------------------- */
function tick() {
  NOW = Date.now();
  if (!DATA || !SESSION || SESSION.role !== "player") return;
  if (PLAYER_TAB !== "matches") return;
  MATCHES.forEach(m => {
    const statusEl = document.getElementById(`status-${m.id}`);
    if (!statusEl) return;
    const locked = isLocked(m, NOW);
    statusEl.className = `qn-status ${locked ? "locked" : ""}`;
    statusEl.textContent = locked ? "🔒 Cerrado" : `⏱ Cierra en ${formatRemaining(lockTimeMs(m) - NOW)}`;
    const homeInput = document.getElementById(`pred-home-${m.id}`);
    const awayInput = document.getElementById(`pred-away-${m.id}`);
    const saveBtn = document.getElementById(`save-btn-${m.id}`);
    if (locked) {
      if (homeInput) homeInput.disabled = true;
      if (awayInput) awayInput.disabled = true;
      if (saveBtn) saveBtn.remove();
    }
  });
  BONUS_MATCHES.forEach(bm => {
    const statusEl = document.getElementById(`status-${bm.id}`);
    if (!statusEl) return;
    const locked = isBonusLocked(bm, NOW);
    statusEl.className = `qn-status ${locked ? "locked" : ""}`;
    statusEl.textContent = locked ? "🔒 Cerrado" : `⏱ Cierra en ${formatRemaining(bonusLockTimeMs(bm) - NOW)}`;
    const homeInput = document.getElementById(`pred-home-${bm.id}`);
    const awayInput = document.getElementById(`pred-away-${bm.id}`);
    const saveBtn = document.getElementById(`save-btn-${bm.id}`);
    if (locked) {
      if (homeInput) homeInput.disabled = true;
      if (awayInput) awayInput.disabled = true;
      if (saveBtn) saveBtn.remove();
    }
  });
}

  if (!t) return;
  const action = t.dataset.action;

  if (action === "login-tab") { LOGIN_TAB = t.dataset.tab; render(); }
  else if (action === "logout") { await doLogout(); }
  else if (action === "set-tab") {
    if (SESSION.role === "admin") ADMIN_TAB = t.dataset.tab; else PLAYER_TAB = t.dataset.tab;
    render();
  }
  else if (action === "save-pred") { await savePrediction(t.dataset.match); }
  else if (action === "save-bonus-pred") { await saveBonusPrediction(t.dataset.match); }
  else if (action === "dismiss-notice") {
    NOTICE_DISMISSED = true;
    const el = document.getElementById("notice-banner");
    if (el) el.remove();
  }
  else if (action === "accept-rules") {
    RULES_ACCEPTED = true;
    const el = document.getElementById("rules-modal");
    if (el) el.remove();
  }
  else if (action === "save-result") {
    const matchId = t.dataset.match;
    const homeInput = document.getElementById(`res-home-${matchId}`);
    const awayInput = document.getElementById(`res-away-${matchId}`);
    const home = homeInput.value.trim(), away = awayInput.value.trim();
    if (home === "" || away === "") { showToast("Ingresa el marcador final de ambos equipos."); return; }
    const next = clone(DATA);
    next.results[matchId] = { home: Number(home), away: Number(away) };
    await persist(next);
    showToast("Resultado guardado, tabla actualizada");
    t.textContent = "Actualizar";
  }
  else if (action === "save-bonus-result") {
    const matchId = t.dataset.match;
    const homeInput = document.getElementById(`res-home-${matchId}`);
    const awayInput = document.getElementById(`res-away-${matchId}`);
    const home = homeInput.value.trim(), away = awayInput.value.trim();
    if (home === "" || away === "") { showToast("Ingresa el marcador final de ambos equipos."); return; }
    const next = clone(DATA);
    next.bonusResults[matchId] = { home: Number(home), away: Number(away) };
    await persist(next);
    showToast("Resultado bonus guardado, tabla actualizada");
    t.textContent = "Actualizar";
  }
  else if (action === "regen-pass") {
    const username = t.dataset.username;
    const next = clone(DATA);
    next.users[username].password = generatePassword();
    await persist(next);
    showToast("Nueva contraseña generada");
    render();
  }
  else if (action === "remove-user") {
    const username = t.dataset.username;
    const next = clone(DATA);
    delete next.users[username];
    delete next.predictions[username];
    await persist(next);
    showToast("Participante eliminado");
    render();
  }
  else if (action === "copy") {
    const text = decodeURIComponent(t.dataset.text);
    try { await navigator.clipboard.writeText(text); showToast("Copiado"); } catch (e2) { showToast("No se pudo copiar"); }
  }
  else if (action === "save-scoring") {
    const outcome = Number(document.getElementById("scoring-outcome").value) || 0;
    const perGoal = Number(document.getElementById("scoring-pergoal").value) || 0;
    const next = clone(DATA);
    next.scoring = { outcome, perGoal };
    await persist(next);
    showToast("Puntuación actualizada");
  }
  else if (action === "save-favorite-team") {
    const select = document.getElementById("favorite-team-select");
    const code = select.value || null;
    const next = clone(DATA);
    next.users[SESSION.username].favoriteTeam = code;
    await persist(next);
    showToast(code ? `Ahora eres hincha de ${teamName(code)}` : "Equipo favorito removido");
    render();
  }
});

app.addEventListener("input", (e) => {
  const t = e.target;
  if (t.classList && t.classList.contains("qn-score-input")) {
    const clean = t.value.replace(/[^0-9]/g, "").slice(0, 2);
    if (clean !== t.value) t.value = clean;
  }
});

app.addEventListener("submit", async (e) => {
  const form = e.target.closest("form[data-action]");
  if (!form) return;
  e.preventDefault();
  const action = form.dataset.action;

  if (action === "login-player-submit") {
    const username = document.getElementById("login-username").value.trim().toLowerCase();
    const password = document.getElementById("login-password").value.trim();
    const rec = DATA.users[username];
    if (rec && rec.password === password) {
      await doLogin("player", username);
    } else {
      document.getElementById("login-error").innerHTML = `<div class="qn-error">Usuario o contraseña incorrectos.</div>`;
    }
  }
  else if (action === "login-admin-submit") {
    const pass = document.getElementById("login-admin-password").value;
    if (pass === DATA.adminPassword) {
      await doLogin("admin", null);
    } else {
      document.getElementById("login-error").innerHTML = `<div class="qn-error">Contraseña de administrador incorrecta.</div>`;
    }
  }
  else if (action === "add-user-submit") {
    const nameInput = document.getElementById("new-user-name");
    const name = nameInput.value.trim();
    if (!name) return;
    const username = generateUsername(name, DATA.users);
    const password = generatePassword();
    const next = clone(DATA);
    next.users[username] = { name, password, createdAt: new Date().toISOString() };
    await persist(next);
    showToast(`Participante agregado: ${username}`);
    render();
  }
  else if (action === "change-admin-pass-submit") {
    const cur = document.getElementById("admin-pass-current").value;
    const next2 = document.getElementById("admin-pass-new").value;
    const errEl = document.getElementById("admin-pass-error");
    if (cur !== DATA.adminPassword) {
      errEl.innerHTML = `<div class="qn-error">La contraseña actual no es correcta.</div>`;
      return;
    }
    if (!next2.trim()) {
      errEl.innerHTML = `<div class="qn-error">Escribe una nueva contraseña.</div>`;
      return;
    }
    const next = clone(DATA);
    next.adminPassword = next2.trim();
    await persist(next);
    showToast("Contraseña de administrador actualizada");
    render();
  }
  else if (action === "change-player-pass-submit") {
    const username = SESSION.username;
    const cur = document.getElementById("player-pass-current").value;
    const next2 = document.getElementById("player-pass-new").value;
    const errEl = document.getElementById("player-pass-error");
    if (cur !== DATA.users[username].password) {
      errEl.innerHTML = `<div class="qn-error">La contraseña actual no es correcta.</div>`;
      return;
    }
    if (!next2.trim()) {
      errEl.innerHTML = `<div class="qn-error">Escribe una nueva contraseña.</div>`;
      return;
    }
    const next = clone(DATA);
    next.users[username].password = next2.trim();
    await persist(next);
    showToast("Contraseña actualizada");
    render();
  }
});

/* ---------------------------------------------------------------
   BOOTSTRAP
--------------------------------------------------------------- */
(async function init() {
  render(); // show "Cargando…" immediately
  try {
    await waitForFirebase();
  } catch (e) {
    app.innerHTML = `<div class="qn-login-wrap"><div style="color:#E8553D;font-family:'Oswald',sans-serif;text-transform:uppercase;text-align:center;padding:20px;">
      ⚠️ No se pudo conectar con Firebase.<br><small style="font-size:12px;opacity:.7;">Verifica la configuración en el archivo HTML.</small>
    </div></div>`;
    return;
  }
  await loadData();
  await restoreSession();
  render();
  startRealtimeSync();          // live updates from Firebase
  TICK_TIMER = setInterval(tick, 30000);
  POLL_TIMER = setInterval(poll, 25000); // kept for compatibility, now a no-op
})();
</script>
